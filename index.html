<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Planet Explorer – Destructible Terrain</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="header">
  <h1>PLANET EXPLORER</h1>
  <div id="hud">
    <span>HP: <b class="val" id="hpLabel">100</b></span>
    <span>Fuel: <b class="val" id="fuelLabel">100</b></span>
    <span>Shots: <b class="val" id="shotsLabel">0</b></span>
    <span>Zoom: <b class="val" id="zoomLabel">1.0x</b></span>
    <span>Terrain: <b class="val" id="terrainLabel">100%</b></span>
    <span id="godToggle" style="cursor:pointer;padding:2px 8px;border:1px solid #333;border-radius:3px;color:#576574" title="Toggle God Mode (G)">GOD: OFF</span>
  </div>
</div>

<div id="game-container">
  <canvas id="canvas"></canvas>
  <div id="timer" style="position:absolute;left:50%;transform:translateX(-50%);top:8px;font-size:24px;font-weight:bold;font-family:monospace;color:#48dbfb;z-index:20;text-shadow:0 0 10px rgba(72,219,251,0.5)">1:00</div>
  <div id="power-bar-container"><div id="power-bar"></div></div>
  <div id="message"></div>
</div>

<div id="controls">
  <span><kbd>A</kbd><kbd>D</kbd> Walk &nbsp; <kbd>W</kbd> Jetpack</span>
  <span>Mouse aim &nbsp; <kbd>Click</kbd> hold charge, release fire &nbsp; <kbd>Scroll</kbd> Zoom &nbsp; <kbd>G</kbd> God mode &nbsp; <kbd>R</kbd> Reset</span>
  <span style="margin-top:2px;display:block">Gamepad: Left stick walk &nbsp; LT Jetpack &nbsp; Right stick aim &nbsp; RT charge/fire &nbsp; LB/RB Zoom &nbsp; Start Reset &nbsp; Back God mode</span>
</div>

<script type="module" src="src/main.js"></script>
</body>
</html>
